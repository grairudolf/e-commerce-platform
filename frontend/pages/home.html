<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trendora - Premium Fashion & Electronics</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#F27F1B">
  <meta name="description" content="Discover premium fashion, electronics, home goods, and more on Trendora.">
</head>
<body>
  <header class="navbar">
    <div class="logo" onclick="window.location.href='home.html'">Trendora</div>
    <input type="text" placeholder="Search for products..." class="search-bar" />
    <div class="icons">
      <i onclick="logoutCustomer()" class="fa fa-sign-out-alt" title="Sign Out"></i>
      <i onclick="window.location.href='cart.html'" class="fa fa-shopping-cart" title="View Cart">
        <span class="badge" id="cart-count">0</span>
      </i>
      <i onclick="window.location.href='orders.html'" class="fa fa-box-open" title="My Orders"></i>
    </div>
  </header>

  <section class="categories" id="categories-bar">
    <!-- Category filter buttons will load dynamically here -->
  </section>

  <main class="product-grid" id="product-grid">
    <!-- Product cards will load dynamically here -->
  </main>

  <div style="text-align: center; padding: 1rem; background: var(--surface); margin-top: 2rem; border-top: 1px solid var(--line); font-size: 0.9rem; color: var(--text-muted);">
    <a href="#" onclick="togglePolicyModal(); return false;" style="color: var(--primary); font-weight: bold; text-decoration: none;">View Trendora Refund & Return Policy</a>
  </div>

  <footer>
    © 2026 Trendora. All rights reserved. Premium Cameroon e-commerce platform.
  </footer>

  <script src="../api.js"></script>
  <script src="home.js"></script>
</body>
</html>
