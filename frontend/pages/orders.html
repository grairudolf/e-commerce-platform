<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trendora - My Orders</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#F27F1B">
  <meta name="description" content="View and track your previous purchase orders, shipment states, and invoices on Trendora.">
</head>
<body>
  <header class="navbar">
    <div class="logo" onclick="window.location.href='home.html'">Trendora</div>
    <input type="text" placeholder="Search for products..." class="search-bar" id="nav-search" />
    <div class="icons">
      <i onclick="logoutCustomer()" class="fa fa-sign-out-alt" title="Sign Out"></i>
      <i onclick="window.location.href='cart.html'" class="fa fa-shopping-cart" title="View Cart">
        <span class="badge" id="cart-count">0</span>
      </i>
      <i onclick="window.location.href='orders.html'" class="fa fa-box-open" title="My Orders"></i>
    </div>
  </header>

  <main class="orders-container" id="orders-main">
    <!-- Orders list will load dynamically here -->
  </main>

  <footer>
    © 2026 Trendora. All rights reserved. Premium Cameroon e-commerce platform.
  </footer>

  <script src="../api.js"></script>
  <script src="orders.js"></script>
</body>
</html>
