<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trendora - Premium Fashion & Electronics Login</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F27F1B">
  <meta name="description" content="Access your Trendora account. Experience the best e-commerce shopping experience for fashion and electronics.">
</head>
<body class="login-body">
  <div class="login-container">
    <h1 class="logo">Trendora</h1>

    <div class="tabs">
      <button type="button" class="active" id="tab-login">Login</button>
      <button type="button" id="tab-register">Register</button>
    </div>

    <form class="login-form">
      <div id="register-fields" style="display: none; flex-direction: column; gap: 1.2rem;">
        <label for="first-name">First Name</label>
        <input type="text" id="first-name" placeholder="John" />

        <label for="last-name">Last Name</label>
        <input type="text" id="last-name" placeholder="Doe" />

        <label for="phone-num">Phone Number</label>
        <input type="tel" id="phone-num" placeholder="+237650000000" />
      </div>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email" required />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" required />

      <a href="#" class="forgot" id="forgot-link">Forgot password?</a>

      <button type="submit" class="signin-btn" id="submit-btn">Sign In</button>

      <div class="divider">
        <span>or</span>
      </div>

      <button type="button" class="social-btn google">
        <i class="fa-brands fa-google"></i> Continue with Google
      </button>

      <button type="button" class="social-btn facebook">
        <i class="fa-brands fa-facebook-f"></i> Continue with Facebook
      </button>
    </form>
  </div>

  <script src="api.js"></script>
  <script src="login.js"></script>
</body>
</html>
